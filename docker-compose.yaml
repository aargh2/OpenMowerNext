services:
  xserver:
    profiles:
    - gui
    image: devrt/xserver
    ipc: host
    security_opt:
    - seccomp:unconfined
    ports:
    - "12345:80"
    healthcheck:
      test: ["CMD-SHELL", "test -e /tmp/.X11-unix/X0"]
      interval: "1s"
      retries: 20
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    image: openmowernext:local
    ipc: host
    network_mode: host
    privileged: true
    security_opt:
    - seccomp:unconfined
    volumes:
    - /dev:/dev
    - ./hardware_tests:/opt/ws/hardware_tests
    - ./scripts:/opt/ws/hardware_tests/scripts:ro
    environment:
    - ROS_LOCALHOST_ONLY=1
    - ROS_DOMAIN_ID=42
