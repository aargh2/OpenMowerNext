services:
  xserver:
    profiles:
    - gui
    image: devrt/xserver
    ipc: host
    security_opt:
    - seccomp:unconfined
    ports:
    - "12345:80"
    healthcheck:
      test: ["CMD-SHELL", "test -e /tmp/.X11-unix/X0"]
      interval: "1s"
      retries: 20
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    image: openmowernext:local
    ipc: host
    network_mode: host
    privileged: true
    security_opt:
    - seccomp:unconfined
    devices:
    - "${OM_HOST_MAINBOARD_SERIAL_PORT:-/dev/ttyAMA0}:/dev/ttyAMA0"
    - "${OM_HOST_GPS_SERIAL_PORT:-/dev/ttyAMA1}:/dev/ttyAMA1"
    - "${OM_HOST_VESC_RIGHT_SERIAL_PORT:-/dev/ttyAMA2}:/dev/ttyAMA2"
    - "${OM_HOST_VESC_MOWER_SERIAL_PORT:-/dev/ttyAMA3}:/dev/ttyAMA3"
    - "${OM_HOST_VESC_LEFT_SERIAL_PORT:-/dev/ttyAMA4}:/dev/ttyAMA4"
    volumes:
    - ./hardware_tests:/opt/ws/hardware_tests
    - ./scripts:/opt/ws/hardware_tests/scripts:ro
    environment:
    - ROS_LOCALHOST_ONLY=1
    - ROS_DOMAIN_ID=42
