#VRML_SIM R2025a utf8

PROTO DockingStation [
  field SFVec3f    translation 0 0 0
  field SFRotation rotation    0 0 1 0
  field SFString   name        "docking_station"
]
{
  Solid {
    translation IS translation
    rotation IS rotation
    name IS name
    children [
      Pose {
        translation 0 0 0.005
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.08 0.08 0.08
              roughness 0.8
              metalness 0
            }
            geometry DEF DOCK_BASE Box {
              size 0.8 0.4 0.01
            }
          }
        ]
      }
      Pose {
        translation 0.35 0 0.075
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.05 0.05 0.05
              roughness 0.6
              metalness 0
            }
            geometry DEF DOCK_CHARGER Box {
              size 0.1 0.3 0.15
            }
          }
        ]
      }
      Pose {
        translation 0.32 0 0.06
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 1 0 0
              emissiveColor 0.5 0 0
              roughness 0.2
              metalness 0
            }
            geometry DEF DOCK_CONTACT Box {
              size 0.02 0.15 0.03
            }
          }
        ]
      }
      Pose {
        translation 0.15 0.2 0.02
        children [
          Shape {
            appearance DEF RAIL_APPEARANCE PBRAppearance {
              baseColor 0.3 0.3 0.3
              roughness 0.65
              metalness 0
            }
            geometry DEF DOCK_RAIL Box {
              size 0.4 0.02 0.04
            }
          }
        ]
      }
      Pose {
        translation 0.15 -0.2 0.02
        children [
          Shape {
            appearance USE RAIL_APPEARANCE
            geometry USE DOCK_RAIL
          }
        ]
      }
    ]
    boundingObject Group {
      children [
        Pose {
          translation 0 0 0.005
          children [
            USE DOCK_BASE
          ]
        }
        Pose {
          translation 0.35 0 0.075
          children [
            USE DOCK_CHARGER
          ]
        }
        Pose {
          translation 0.15 0.2 0.02
          children [
            USE DOCK_RAIL
          ]
        }
        Pose {
          translation 0.15 -0.2 0.02
          children [
            USE DOCK_RAIL
          ]
        }
      ]
    }
  }
}
