          boundingObject USE WHEEL_CYLINDER
          physics Physics {
            density -1
            mass 0.2
          }
        }
      }
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 0 0 1
          anchor 0.18 0 -0.05
        }
        device [
          RotationalMotor {
            name "mower_joint"
            maxVelocity 80
            maxTorque 2
          }
          PositionSensor {
            name "mower_joint_sensor"
          }
        ]
        endPoint Solid {
          translation 0.18 0 -0.05
          children [
            Shape {
              appearance PBRAppearance {
                baseColor 1 0 0
                roughness 0.55
                metalness 0
              }
              geometry DEF MOWER_CYLINDER Cylinder {
                height 0.01
                radius 0.065
              }
            }
          ]
          name "mower"
          boundingObject USE MOWER_CYLINDER
          physics Physics {
            density -1
            mass 0.2
          }
        }
