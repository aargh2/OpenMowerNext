                height 0.04
                radius 0.0925
              }
            }
          ]
          name "left_wheel"
          boundingObject USE WHEEL_CYLINDER
          physics Physics {
            density -1
            mass 0.2
          }
        }
      }
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 0 1 0
          anchor 0 -0.16 0
        }
        device [
          RotationalMotor {
            name "right_wheel_joint"
            maxVelocity 12
            maxTorque 40
          }
          PositionSensor {
            name "right_wheel_joint_sensor"
