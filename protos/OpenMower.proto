  field SFBool     synchronization TRUE
]
{
  Robot {
    translation IS translation
    rotation IS rotation
    name IS name
    controller IS controller
    controllerArgs IS controllerArgs
    supervisor IS supervisor
    synchronization IS synchronization
    children [
      Pose {
        translation 0.175 0 0.04
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 1 0.3 0.1
              roughness 0.65
              metalness 0
            }
            geometry DEF CHASSIS_BOX Box {
              size 0.55 0.325 0.15
            }
          }
        ]
      }
      Pose {
        translation 0.45 0 0.04
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0 0.8 0
              roughness 0.4
              metalness 0
            }
            geometry Sphere {
              radius 0.01
            }
          }
        ]
      }
      GPS {
        translation 0.32 0 0.1
        name "gps"
      }
      InertialUnit {
        name "inertial_unit"
      }
      Gyro {
        name "gyro"
      }
      Accelerometer {
        name "accelerometer"
      }
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 0 1 0
          anchor 0 0.16 0
