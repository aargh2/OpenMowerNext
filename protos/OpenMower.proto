                radius 0.05
              }
            }
          ]
          name "left_caster_wheel"
          boundingObject USE CASTER_SPHERE
          physics Physics {
            density -1
            mass 0.05
          }
        }
      }
      BallJoint {
        jointParameters BallJointParameters {
          anchor 0.35 -0.1 -0.0425
        }
        endPoint Solid {
          translation 0.35 -0.1 -0.0425
          children [
            Shape {
              appearance USE CASTER_APPEARANCE
              geometry USE CASTER_SPHERE
            }
          ]
          name "right_caster_wheel"
          boundingObject USE CASTER_SPHERE
          physics Physics {
            density -1
            mass 0.05
          }
